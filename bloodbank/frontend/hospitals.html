<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hospitals — Blood Bank Management System</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
    <div class="layout">
        <aside class="sidebar" id="sidebar"></aside>

        <main class="main">
            <h2>Hospitals</h2>
            <p class="page-subtitle">Manage registered hospitals that can request blood units.</p>

            <div id="alert-box"></div>

            <div class="card">
                <div class="toolbar">
                    <div></div>
                    <button class="btn btn-primary" id="add-hospital-btn">+ Add Hospital</button>
                </div>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th><th>Name</th><th>Contact Person</th>
                                <th>Phone</th><th>Email</th><th>Address</th><th>Registered</th><th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="hospitals-body">
                            <tr><td colspan="8" class="empty-state">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Hospital Modal -->
    <div class="modal-overlay" id="hospital-modal">
        <div class="modal">
            <h3 id="hospital-modal-title">Add Hospital</h3>
            <form id="hospital-form">
                <input type="hidden" id="hospital-id" />
                <div class="form-grid">
                    <div class="form-group">
                        <label for="name">Hospital Name *</label>
                        <input type="text" id="name" required />
                    </div>
                    <div class="form-group">
                        <label for="contact_person">Contact Person</label>
                        <input type="text" id="contact_person" />
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone *</label>
                        <input type="text" id="phone" required />
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" />
                    </div>
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label for="address">Address</label>
                        <input type="text" id="address" />
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <button type="button" class="btn btn-secondary" id="hospital-cancel-btn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/hospitals.js"></script>
</body>
</html>
