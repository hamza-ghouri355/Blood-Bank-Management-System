<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Donations — Blood Bank Management System</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
    <div class="layout">
        <aside class="sidebar" id="sidebar"></aside>

        <main class="main">
            <h2>Donations</h2>
            <p class="page-subtitle">Record new donations and view donation history.</p>

            <div id="alert-box"></div>

            <div class="card">
                <div class="toolbar">
                    <div></div>
                    <button class="btn btn-primary" id="add-donation-btn">+ Record Donation</button>
                </div>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th><th>Donor</th><th>Unit ID</th><th>Date</th>
                                <th>Volume (ml)</th><th>Notes</th><th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="donations-body">
                            <tr><td colspan="7" class="empty-state">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Record Donation Modal -->
    <div class="modal-overlay" id="donation-modal">
        <div class="modal">
            <h3>Record Donation</h3>
            <form id="donation-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="donor_id">Donor *</label>
                        <select id="donor_id" required>
                            <option value="">Select donor</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="donation_date">Donation Date *</label>
                        <input type="date" id="donation_date" required />
                    </div>
                    <div class="form-group">
                        <label for="volume_ml">Volume (ml) *</label>
                        <input type="number" id="volume_ml" min="1" required value="450" />
                    </div>
                    <div class="form-group">
                        <label for="blood_type">Blood Type (for new unit) *</label>
                        <select id="blood_type" required>
                            <option value="">Select</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="expiry_date">Expiry Date (for new unit) *</label>
                        <input type="date" id="expiry_date" required />
                    </div>
                    <div class="form-group">
                        <label for="storage_location">Storage Location *</label>
                        <input type="text" id="storage_location" required placeholder="e.g. Fridge A1" />
                    </div>
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label for="notes">Notes</label>
                        <textarea id="notes" rows="2"></textarea>
                    </div>
                </div>
                <p class="text-muted" style="margin-top: 10px;">
                    Recording a donation will automatically create a new blood inventory unit
                    and update the donor's last donation date and eligibility status (90-day rule).
                </p>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <button type="button" class="btn btn-secondary" id="donation-cancel-btn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/donations.js"></script>
</body>
</html>
