<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Donors — Blood Bank Management System</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
    <div class="layout">
        <aside class="sidebar" id="sidebar"></aside>

        <main class="main">
            <h2>Donors</h2>
            <p class="page-subtitle">Manage donor registrations, blood types, and eligibility status.</p>

            <div id="alert-box"></div>

            <div class="card">
                <div class="toolbar">
                    <div class="filters">
                        <div class="form-group">
                            <label for="filter-blood-type">Blood Type</label>
                            <select id="filter-blood-type">
                                <option value="">All</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="filter-eligibility">Eligibility</label>
                            <select id="filter-eligibility">
                                <option value="">All</option>
                                <option value="Eligible">Eligible</option>
                                <option value="Not Eligible">Not Eligible</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn btn-primary" id="add-donor-btn">+ Add Donor</button>
                </div>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th><th>Name</th><th>Blood Type</th><th>Phone</th>
                                <th>Email</th><th>Last Donation</th><th>Eligibility</th><th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="donors-body">
                            <tr><td colspan="8" class="empty-state">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Donor Modal -->
    <div class="modal-overlay" id="donor-modal">
        <div class="modal">
            <h3 id="donor-modal-title">Add Donor</h3>
            <div id="modal-alert-box"></div>
            <form id="donor-form" novalidate>
                <input type="hidden" id="donor-id" />
                <div class="form-grid">
                    <div class="form-group">
                        <label for="full_name">Full Name *</label>
                        <input type="text" id="full_name" required />
                    </div>
                    <div class="form-group">
                        <label for="blood_type">Blood Type *</label>
                        <select id="blood_type" required>
                            <option value="">Select</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <select id="gender">
                            <option value="">Select</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="date_of_birth">Date of Birth * <span id="dob-hint" style="font-weight:400; color:#888; font-size:0.8rem;"></span></label>
                        <input type="date" id="date_of_birth" min="1900-01-01" required />
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone *</label>
                        <input type="text" id="phone" required />
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" />
                    </div>
                    <div class="form-group">
                        <label for="address">Address</label>
                        <input type="text" id="address" />
                    </div>
                    <div class="form-group">
                        <label for="last_donation_date">Last Donation Date</label>
                        <input type="date" id="last_donation_date" />
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <button type="button" class="btn btn-secondary" id="donor-cancel-btn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/donors.js"></script>
</body>
</html>
